<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Shortener</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🔗 URL Shortener</h1>
    <p>Convert long URLs into short, shareable links.</p>

    <form method="POST">
        <input
            type="text"
            name="url"
            placeholder="Enter your URL"
            required>

        <button type="submit">
            Shorten URL
        </button>
    </form>

    {% if short_url %}
    <div class="result">
        <h3>Short URL</h3>
        <a href="{{ short_url }}" target="_blank">
            {{ short_url }}
        </a>
    </div>
    {% endif %}

</div>

</body>
</html>
